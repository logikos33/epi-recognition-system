# EPI Monitor V2 — API Service nixpacks
# Build target: ~3 minutos (backend + frontend)

[phases.setup]
nixPkgs = ["python311", "nodejs-20"]

[phases.install]
cmds = [
  "pip install --upgrade pip --quiet",
  "pip install -r requirements.txt --quiet",
  "cd frontend-new && npm install --quiet"
]

[phases.build]
cmds = [
  "cd frontend-new && VITE_API_URL=https://epi-recognition-system-production.up.railway.app npm run build"
]

[variables]
NODE_ENV = "production"

[start]
cmd = "python3 railway_start.py"

[phases.setup]
nixPkgs = ["python311", "ffmpeg", "ffmpeg-full", "libgcc", "stdenv.cc.cc.lib"]
aptPkgs = ["libgl1", "libglib2.0-0", "libsm6", "libxext6", "libxrender1", "libgomp1"]

[phases.install]
cmds = [
    "python3.11 -m venv /opt/venv",
    "/opt/venv/bin/pip install --upgrade pip",
    "/opt/venv/bin/pip install -r requirements-railway.txt"
]

[start]
cmd = "/opt/venv/bin/gunicorn wsgi:app --workers 2 --timeout 120 --bind 0.0.0.0:$PORT --log-level info"

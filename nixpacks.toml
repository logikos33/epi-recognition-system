# EPI Monitor V2 — Railway deployment
[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = [
    "python3.11 -m pip install --upgrade pip",
    "python3.11 -m pip install gunicorn flask flask-cors psycopg2-binary pyjwt bcrypt python-dotenv requests flask-socketio python-socketio eventlet"
]

[start]
cmd = "python3.11 -m gunicorn wsgi:app --workers 1 --timeout 60 --bind 0.0.0.0:$PORT --log-level info"

# EPI Monitor V2 — API Service + Frontend
# Build target: ~4 minutos (backend + frontend)

[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = [
  "pip install --upgrade pip --quiet",
  "pip install -r requirements.txt --quiet"
]

[phases.build]
cmds = [
  "curl -fsSL https://deb.nodesource.com/setup_20.x | bash -",
  "apt-get install -y nodejs --quiet",
  "cd frontend-new && npm install --quiet",
  "cd frontend-new && VITE_API_URL=https://epi-recognition-system-production.up.railway.app npm run build"
]

[start]
cmd = "python3 railway_start.py"

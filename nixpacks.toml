# EPI Monitor V2 — Railway deployment
# Let nixpacks auto-detect Python from requirements.txt
[phases.setup]
nixPkgs = ["ffmpeg"]

[phases.install]
cmds = [
    "pip install --upgrade pip",
    "pip install -r requirements-railway.txt"
]

[start]
cmd = "gunicorn wsgi:app --workers 1 --timeout 60 --bind 0.0.0.0:$PORT --log-level info"

<!DOCTYPE html>
<html>
<head>
    <title>Test API</title>
</head>
<body>
    <h1>Teste de API</h1>
    <button onclick="testLogin()">Login</button>
    <button onclick="testCameras()">List Câmeras</button>
    <pre id="result"></pre>
    
    <script>
        let token = '';
        
        async function testLogin() {
            const res = await fetch('http://127.0.0.1:5001/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: 'test@local.dev', password: '123456' })
            });
            const data = await res.json();
            token = data.token;
            document.getElementById('result').textContent = JSON.stringify(data, null, 2);
        }
        
        async function testCameras() {
            const res = await fetch('http://127.0.0.1:5001/api/cameras', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = await res.json();
            document.getElementById('result').textContent = JSON.stringify(data, null, 2);
        }
    </script>
</body>
</html>

services:
  # Python API com YOLO
  - type: web
    name: epi-recognition-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python api_server.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.0
      - key: PORT
        value: 5001
      - key: FLASK_ENV
        value: production
    healthCheckPath: /health
    autoDeploy: true
    plan: free
    region: oregon

# Railway Deployment Configuration
# Last updated: 2026-04-05 18:00 UTC - Force cache rebuild
# Using requirements-railway.txt to avoid ML/CUDA dependency crashes

[phases.setup]
nixPkgs = ["python311", "ffmpeg", "postgresql"]

[phases.build]
cmd = "python -m pip install --upgrade pip && pip install -r requirements-railway.txt"

[start]
cmd = "gunicorn api_server:app --worker eventlet --worker-connections 1000 --timeout 120 --bind 0.0.0.0:8080"

[phases.install]
cmds = ["python -m pip install --upgrade pip", "pip install -r requirements-railway.txt"]

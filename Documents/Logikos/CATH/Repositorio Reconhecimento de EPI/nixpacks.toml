# Railway Deployment Configuration
# Last updated: 2026-04-05 19:40 UTC - Fix pip installation
# Using nixpkgs with pip pre-installed

[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "ffmpeg", "postgresql"]

[phases.build]
cmd = "pip install --upgrade pip && pip install -r requirements-railway.txt"

[start]
cmd = "gunicorn api_server:app --worker eventlet --worker-connections 1000 --timeout 120 --bind 0.0.0.0:8080"

[phases.install]
cmds = ["pip install --upgrade pip setuptools wheel", "pip install -r requirements-railway.txt"]

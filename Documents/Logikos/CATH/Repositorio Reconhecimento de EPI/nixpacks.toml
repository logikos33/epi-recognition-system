# Railway deployment configuration for EPI Recognition System
# Forces fresh build with Python 3.11 + FFmpeg + requirements-railway.txt
# CACHE BUST - 1775425000 - Force Railway to ignore Dockerfile and use this nixpacks.toml
# CACHE BUST - DELETE DOCKERFILE - Dockerfile was deleted, Railway MUST use this file

[phases.setup]
nixPkgs = ["python311", "ffmpeg", "ffmpeg-full"]
aptPkgs = ["libgl1", "libglib2.0-0", "libsm6", "libxext6", "libxrender1", "libgomp1"]

[phases.build]
cmds = [
  "python -m venv /opt/venv",
  ". /opt/venv/bin/activate",
  "pip install --upgrade pip setuptools wheel",
  "pip install -r requirements-railway.txt",
  "pip install gunicorn eventlet"
]

[start]
cmd = "gunicorn api_server:app --worker-class eventlet --worker-connections 1000 --timeout 120 --bind 0.0.0.0:$PORT"
